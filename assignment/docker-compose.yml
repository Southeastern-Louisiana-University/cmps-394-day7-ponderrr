services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: items_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d items_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://appuser:apppass@db:5432/items_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  ui:
    build: ./ui
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app_network

volumes:
  pgdata:

networks:
  app_network:

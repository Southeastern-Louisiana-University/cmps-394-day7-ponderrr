services:

  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hello
    volumes:
      # Named volume: data persists across container restarts/rebuilds
      - db_data:/var/lib/postgresql/data
      # Init script: runs once when the data directory is first created
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ─── Go API ───────────────────────────────────────────────────────────────
  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: hello
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # ─── Nginx UI ─────────────────────────────────────────────────────────────
  ui:
    build: ./ui
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app_network

# ─── Named volume ─────────────────────────────────────────────────────────────
volumes:
  db_data:

# ─── Custom network ──────────────────────────────────────────────────────────
networks:
  app_network: